name: episodiq

services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: episodiq
      POSTGRES_PASSWORD: episodiq
      POSTGRES_DB: episodiq_test
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U episodiq -d episodiq_test"]
      interval: 5s
      timeout: 5s
      retries: 5
